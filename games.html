<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Block Blast | Climate Wise</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Fredoka', sans-serif; 
            background: #ffffff; 
            display: flex; flex-direction: column; align-items: center; 
            touch-action: none; /* Prevents scrolling while dragging */
        }
        h2 { color: #2e7d32; margin-top: 20px; }
        
        #score-container { font-size: 24px; font-weight: 600; margin-bottom: 10px; }

        /* THE 8x8 GRID */
        #grid {
            display: grid;
            grid-template-columns: repeat(8, 45px);
            grid-template-rows: repeat(8, 45px);
            gap: 4px;
            background: #e0e0e0;
            padding: 8px;
            border-radius: 8px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }
        .cell {
            width: 45px; height: 45px;
            background: #f8f9fa;
            border-radius: 4px;
        }
        .filled { background: #66bb6a !important; transition: background 0.2s; }

        /* PIECE TRAY */
        #tray {
            display: flex;
            justify-content: space-around;
            width: 380px;
            margin-top: 30px;
            min-height: 120px;
        }
        .piece {
            cursor: grab;
            display: grid;
            gap: 2px;
            transition: transform 0.1s;
        }
        .piece:active { cursor: grabbing; transform: scale(1.1); }
        .block { width: 30px; height: 30px; border-radius: 4px; }
        
        /* Piece Colors */
        .color1 { background: #2e7d32; }
        .color2 { background: #81c784; }
        .color3 { background: #4caf50; }
    </style>
</head>
<body>

    <h2>Eco Block Blast</h2>
    <div id="score-container">Score: <span id="score">0</span></div>

    <div id="grid"></div>

    <div id="tray">
        </div>

    <div class="mt-4">
        <a href="index.html" class="btn btn-outline-success rounded-pill">Back to Home</a>
    </div>

    <script>
        const gridEl = document.getElementById('grid');
        const trayEl = document.getElementById('tray');
        const scoreEl = document.getElementById('score');
        let score = 0;
        let grid = Array(8).fill().map(() => Array(8).fill(0));

        // Create the UI Grid
        function createGrid() {
            gridEl.innerHTML = '';
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.r = r;
                    cell.dataset.c = c;
                    gridEl.appendChild(cell);
                }
            }
        }

        // Piece Templates (Shapes)
        const shapes = [
            [[1, 1], [1, 1]], // Square
            [[1], [1], [1]], // Vertical Line
            [[1, 1, 1]],     // Horizontal Line
            [[1, 0], [1, 1]], // L shape
            [[1]]             // Single dot
        ];

        function spawnPieces() {
            trayEl.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const shape = shapes[Math.floor(Math.random() * shapes.length)];
                const piece = document.createElement('div');
                piece.className = 'piece';
                piece.draggable = true;
                piece.style.gridTemplateColumns = `repeat(${shape[0].length}, 32px)`;
                
                shape.forEach((row, r) => {
                    row.forEach((val, c) => {
                        const block = document.createElement('div');
                        block.className = val ? 'block color' + (i + 1) : '';
                        piece.appendChild(block);
                    });
                });

                piece.addEventListener('dragstart', (e) => {
                    e.dataTransfer.setData('shape', JSON.stringify(shape));
                    e.dataTransfer.setData('pieceId', i);
                });
                trayEl.appendChild(piece);
            }
        }

        // Drag & Drop Logic
        gridEl.addEventListener('dragover', (e) => e.preventDefault());
        gridEl.addEventListener('drop', (e) => {
            const shape = JSON.parse(e.dataTransfer.getData('shape'));
            const rect = gridEl.getBoundingClientRect();
            
            // Simplified placement (find nearest cell)
            const target = e.target;
            if (!target.classList.contains('cell')) return;
            
            let startR = parseInt(target.dataset.r);
            let startC = parseInt(target.dataset.c);

            if (canPlace(shape, startR, startC)) {
                placeShape(shape, startR, startC);
                checkLines();
                // Simple logic: remove piece after use
                const items = trayEl.querySelectorAll('.piece');
                items[e.dataTransfer.getData('pieceId')].style.visibility = 'hidden';
                
                // If all hidden, spawn new ones
                if ([...items].every(i => i.style.visibility === 'hidden')) spawnPieces();
            }
        });

        function canPlace(shape, startR, startC) {
            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[r].length; c++) {
                    if (shape[r][c]) {
                        if (startR + r >= 8 || startC + c >= 8 || grid[startR + r][startC + c]) return false;
                    }
                }
            }
            return true;
        }

        function placeShape(shape, startR, startC) {
            shape.forEach((row, r) => {
                row.forEach((val, c) => {
                    if (val) {
                        grid[startR + r][startC + c] = 1;
                        const cell = document.querySelector(`[data-r="${startR + r}"][data-c="${startC + c}"]`);
                        cell.classList.add('filled');
                        score += 10;
                    }
                });
            });
            scoreEl.innerText = score;
        }

        function checkLines() {
            let rowsToClear = [];
            let colsToClear = [];

            // Check Rows
            for (let r = 0; r < 8; r++) {
                if (grid[r].every(cell => cell === 1)) rowsToClear.push(r);
            }

            // Check Cols
            for (let c = 0; c < 8; c++) {
                let col = [];
                for (let r = 0; r < 8; r++) col.push(grid[r][c]);
                if (col.every(cell => cell === 1)) colsToClear.push(c);
            }

            // Clear them
            rowsToClear.forEach(r => {
                for (let c = 0; c < 8; c++) {
                    grid[r][c] = 0;
                    document.querySelector(`[data-r="${r}"][data-c="${c}"]`).classList.remove('filled');
                }
                score += 100;
            });

            colsToClear.forEach(c => {
                for (let r = 0; r < 8; r++) {
                    grid[r][c] = 0;
                    document.querySelector(`[data-r="${r}"][data-c="${c}"]`).classList.remove('filled');
                }
                score += 100;
            });
            scoreEl.innerText = score;
        }

        createGrid();
        spawnPieces();
    </script>
</body>
</html>
