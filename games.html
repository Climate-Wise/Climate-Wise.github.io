<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Climate TCG Pocket | Climate Wise</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Fredoka', sans-serif; 
            background: #f0f2f5; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; margin: 0;
        }

        .header-nav { width: 100%; background: #2e7d32; padding: 10px; text-align: center; color: white; }

        /* THE CARD */
        .card-container {
            perspective: 1000px;
            margin-top: 50px;
        }

        .tcg-card {
            width: 300px; height: 420px;
            background: white;
            border-radius: 18px;
            border: 8px solid #333;
            padding: 20px;
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            display: flex; flex-direction: column; align-items: center;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }

        /* Holo Effect Animation */
        .holo {
            border-color: #ffd700; /* Gold border for rare */
            background: linear-gradient(135deg, #fff 0%, #fff 45%, #f0f 50%, #fff 55%, #fff 100%);
            background-size: 300% 300%;
            animation: holo-shimmer 3s infinite linear;
        }

        @keyframes holo-shimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card-img {
            width: 100%; height: 180px;
            background: #e9ecef;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 60px;
        }

        .card-type { font-weight: 600; color: #666; font-size: 14px; text-transform: uppercase; }
        .card-name { font-size: 24px; font-weight: 600; margin: 5px 0; }
        .card-info { font-size: 16px; color: #444; margin-top: 10px; }

        .rarity-badge {
            position: absolute; bottom: 15px; right: 15px;
            font-size: 20px;
        }

        /* UI BUTTONS */
        .controls { margin-top: 40px; text-align: center; }
        .btn-open {
            padding: 15px 40px; font-size: 20px;
            background: #ff0000; color: white;
            border: none; border-radius: 50px;
            box-shadow: 0 5px 0 #b30000;
            transition: 0.1s;
        }
        .btn-open:active { transform: translateY(4px); box-shadow: 0 1px 0 #b30000; }

        .collection-stats { margin-top: 20px; color: #555; }
    </style>
</head>
<body>

    <div class="header-nav">
        <h3 class="m-0">Climate TCG Pocket</h3>
    </div>

    <div class="card-container">
        <div id="card" class="tcg-card">
            <div class="card-type" id="type">Common</div>
            <div id="image" class="card-img">?</div>
            <div class="card-name" id="name">Welcome!</div>
            <div class="card-info" id="info">Open a pack to find your first Climate Wise card.</div>
            <div class="rarity-badge" id="rarity">⚪</div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-open" onclick="pullCard()">OPEN PACK</button>
        <div class="collection-stats">
            Cards Found: <span id="count">0</span> | Holos: <span id="holos">0</span>
        </div>
        <a href="index.html" class="d-block mt-4 text-decoration-none text-success">← Back to Home</a>
    </div>

    <script>
        const cardData = [
            // COMMON CARDS
            { name: "LED Bulb", type: "Utility", info: "LEDs use 75% less energy than old bulbs.", img: "💡", rarity: "Common", icon: "⚪", prob: 0.7 },
            { name: "Compost Bin", type: "Home", info: "Reduces methane by keeping food out of landfills.", img: "♻️", rarity: "Common", icon: "⚪", prob: 0.7 },
            { name: "Public Transit", type: "Travel", info: "Taking the bus reduces your footprint significantly.", img: "🚌", rarity: "Common", icon: "⚪", prob: 0.7 },
            
            // RARE HOLO CARDS
            { name: "Global Reforestation", type: "Holo Rare", info: "A mature tree absorbs 48 lbs of CO2 per year!", img: "🌳", rarity: "Rare", icon: "⭐", prob: 0.1 },
            { name: "Ocean Cleanup", type: "Holo Rare", info: "The ocean produces over 50% of the world's oxygen.", img: "🌊", rarity: "Rare", icon: "⭐", prob: 0.1 },
            { name: "Wind Farm", type: "Holo Rare", info: "One wind turbine can power 1,500 homes annually.", img: "🌬️", rarity: "Rare", icon: "⭐", prob: 0.1 }
        ];

        let count = 0;
        let holos = 0;

        function pullCard() {
            // Animation reset
            const cardEl = document.getElementById('card');
            cardEl.style.transform = "rotateY(360deg)";
            
            setTimeout(() => {
                // RNG Logic
                const isRare = Math.random() < 0.2; // 20% chance for a rare
                const pool = cardData.filter(c => isRare ? c.rarity === "Rare" : c.rarity === "Common");
                const card = pool[Math.floor(Math.random() * pool.length)];

                // Update UI
                document.getElementById('type').innerText = card.type;
                document.getElementById('image').innerText = card.img;
                document.getElementById('name').innerText = card.name;
                document.getElementById('info').innerText = card.info;
                document.getElementById('rarity').innerText = card.icon;

                // Toggle Holo Effect
                if (card.rarity === "Rare") {
                    cardEl.classList.add('holo');
                    holos++;
                } else {
                    cardEl.classList.remove('holo');
                }

                count++;
                document.getElementById('count').innerText = count;
                document.getElementById('holos').innerText = holos;
                cardEl.style.transform = "rotateY(0deg)";
            }, 300);
        }
    </script>
</body>
</html>
