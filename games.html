<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battery Dash | Climate Wise</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Roboto:wght@400;500&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Roboto', sans-serif; 
            margin: 0; overflow: hidden; 
            background: #ffffff; /* YouTube White Background */
            color: #0f0f0f;
        }

        /* YOUTUBE HOME / PICKER SCREEN */
        #game-picker {
            position: absolute;
            width: 100%; height: 100%;
            background: #ffffff;
            z-index: 200;
            padding-top: 50px;
        }

        .yt-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }

        .yt-card {
            width: 360px;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        .yt-thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            background: #ff0000; /* YouTube Red */
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            position: relative;
        }

        .yt-thumbnail::after {
            content: "10:04";
            position: absolute;
            bottom: 8px; right: 8px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 2px 4px;
            border-radius: 4px;
            font-size: 12px;
        }

        .yt-details {
            display: flex;
            margin-top: 12px;
            gap: 12px;
        }

        .yt-avatar {
            width: 36px; height: 36px;
            background: #2e7d32;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .yt-title {
            font-weight: 500;
            font-size: 16px;
            line-height: 1.4;
            color: #0f0f0f;
        }

        .yt-meta {
            font-size: 14px;
            color: #606060;
        }

        /* GAME PLAY AREA (VIDEO PLAYER THEME) */
        #game-box {
            position: relative;
            width: 100vw; height: 100vh;
            display: none;
            background: #f9f9f9; /* Subtle grey like YT cinema mode */
        }

        #car {
            position: absolute;
            width: 60px; height: 40px;
            background: #ff0000; /* YouTube Red Car */
            border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .battery {
            position: absolute;
            width: 35px; height: 35px;
            background: #ffffff;
            border: 2px solid #ff0000;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #ff0000;
            font-weight: bold;
        }

        /* YOUTUBE PLAYER CONTROLS (HUD) */
        #ui-overlay {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            padding: 20px;
            color: white;
            z-index: 100;
            display: none;
        }

        .progress-bar-container {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.3);
            margin-bottom: 15px;
            position: relative;
        }

        #progress-red {
            height: 100%;
            width: 0%;
            background: #ff0000;
        }

        .player-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>

                        <div class="yt-meta">Climate Wise • 1.2M views • 2 hours ago</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
