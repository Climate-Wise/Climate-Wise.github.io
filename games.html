<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbon Ranker | Incremental Game</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #f8f9fa; --text-color: #333333; --accent: #2e7d32; }
        [data-bs-theme="dark"] { --bg-color: #121212; --text-color: #f8f9fa; --accent: #4caf50; }
        body { font-family: 'Fredoka', sans-serif; background-color: var(--bg-color); color: var(--text-color); }
        
        .game-card { background: var(--bg-color); border: 3px solid var(--accent); border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .stat-badge { background: var(--accent); color: white; padding: 8px 15px; border-radius: 10px; font-weight: bold; margin-right: 10px; }
        .upgrade-btn { width: 100%; text-align: left; margin-bottom: 8px; font-size: 0.9rem; }
        .scroll-box { height: 300px; overflow-y: auto; padding-right: 10px; }
        .rank-banner { font-size: 1.5rem; font-weight: bold; color: var(--accent); text-align: center; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="game-card">
                <div class="rank-banner" id="userRank">Rank: Carbon Amateur</div>
                
                <div class="d-flex justify-content-center mb-4">
                    <span class="stat-badge">Coins: <span id="coinCount">0</span></span>
                    <span class="stat-badge">CPS (Coins Per Second): <span id="cpsCount">0</span></span>
                    <span class="stat-badge">Q: <span id="qCount">1</span>/50</span>
                </div>

                <div class="row">
                    <!-- Quiz Section -->
                    <div class="col-md-7 border-end">
                        <h4 id="questionText">Loading Question...</h4>
                        <div id="optionsContainer" class="d-grid gap-2 mt-4">
                            <!-- Options go here -->
                        </div>
                        <div id="gameMsg" class="mt-3 fw-bold text-center"></div>
                    </div>

                    <!-- Upgrade Section -->
                    <div class="col-md-5">
                        <h5 class="text-success fw-bold mb-3">Upgrades (20 Levels)</h5>
                        <div class="scroll-box" id="upgradeList">
                            <!-- Upgrades go here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let coins = 0;
    let cps = 0;
    let currentQ = 0;
    let rankIndex = 0;

    const ranks = ["Carbon Amateur", "Eco-Friendly Scout", "Green Guardian", "Sustainability Specialist", "Planet Protector", "Climate Hero", "Earth Legend"];
    
    // 50 Questions Data
    const questions = Array.from({length: 50}, (_, i) => ({
        q: `Environmental Question #${i+1}: Which action helps more?`,
        options: ["Option A (Correct)", "Option B", "Option C"],
        correct: 0
    }));

    // 20 Upgrades Data
    const upgrades = [
        { name: "Recycling Bin", cost: 10, power: 1 },
        { name: "Compost Pile", cost: 50, power: 5 },
        { name: "LED Bulbs", cost: 150, power: 12 },
        { name: "Smart Thermostat", cost: 400, power: 25 },
        { name: "Bicycle Commute", cost: 1000, power: 60 },
        { name: "Hybrid Car", cost: 2500, power: 150 },
        { name: "Solar Panels", cost: 6000, power: 400 },
        { name: "Wind Turbine", cost: 15000, power: 1000 },
        { name: "Hydro Power", cost: 35000, power: 2500 },
        { name: "Carbon Scrubber", cost: 80000, power: 6000 },
        { name: "Reforestation Project", cost: 150000, power: 12000 },
        { name: "Green Tech R&D", cost: 300000, power: 25000 },
        { name: "Sustainable City", cost: 700000, power: 60000 },
        { name: "Global Carbon Tax", cost: 1500000, power: 150000 },
        { name: "Eco-Industrial Park", cost: 4000000, power: 400000 },
        { name: "Ocean Cleanup Array", cost: 10000000, power: 1000000 },
        { name: "Algae Biofuel", cost: 25000000, power: 2500000 },
        { name: "Fusion Energy", cost: 75000000, power: 8000000 },
        { name: "Atmospheric Restoration", cost: 200000000, power: 20000000 },
        { name: "Planet Renewal Engine", cost: 500000000, power: 50000000 }
    ];

    function initGame() {
        showQuestion();
        renderUpgrades();
        setInterval(autoEarn, 1000);
    }

    function showQuestion() {
        if (currentQ >= 50) {
            document.getElementById('questionText').innerText = "All Questions Complete! Keep upgrading!";
            document.getElementById('optionsContainer').innerHTML = "";
            return;
        }
        const data = questions[currentQ];
        document.getElementById('questionText').innerText = data.q;
        document.getElementById('qCount').innerText = currentQ + 1;
        
        const container = document.getElementById('optionsContainer');
        container.innerHTML = "";
        data.options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = "btn btn-outline-success rounded-pill";
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(idx);
            container.appendChild(btn);
        });
    }

    function checkAnswer(idx) {
        if (idx === questions[currentQ].correct) {
            coins += 1;
            document.getElementById('gameMsg').innerText = "Correct! +1 Coin";
            document.getElementById('gameMsg').className = "mt-3 fw-bold text-center text-success";
            currentQ++;
            updateRank();
            showQuestion();
        } else {
            document.getElementById('gameMsg').innerText = "Incorrect! Try again.";
            document.getElementById('gameMsg').className = "mt-3 fw-bold text-center text-danger";
        }
        updateDisplay();
    }

    function renderUpgrades() {
        const list = document.getElementById('upgradeList');
        list.innerHTML = "";
        upgrades.forEach((u, i) => {
            const btn = document.createElement('button');
            btn.className = "btn btn-secondary btn-sm upgrade-btn";
            btn.id = `upg-${i}`;
            btn.innerHTML = `${u.name} (Cost: ${u.cost}) <br><small>+${u.power} CPS</small>`;
            btn.onclick = () => buyUpgrade(i);
            list.appendChild(btn);
        });
    }

    function buyUpgrade(i) {
        const u = upgrades[i];
        if (coins >= u.cost) {
            coins -= u.cost;
            cps += u.power;
            u.cost = Math.floor(u.cost * 1.5); // Price increases
            renderUpgrades();
            updateDisplay();
        }
    }

    function autoEarn() {
        coins += cps;
        updateDisplay();
    }

    function updateRank() {
        // Ranks change every 8 questions
        rankIndex = Math.min(Math.floor(currentQ / 8), ranks.length - 1);
        document.getElementById('userRank').innerText = "Rank: " + ranks[rankIndex];
    }

    function updateDisplay() {
        document.getElementById('coinCount').innerText = Math.floor(coins);
        document.getElementById('cpsCount').innerText = cps;
    }

    initGame();
</script>

</body>
</html>
