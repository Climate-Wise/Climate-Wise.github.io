<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battery Dash | Climate Wise</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Fredoka', sans-serif; 
            margin: 0; overflow: hidden; 
            background: #111;
        }

        /* START SCREEN / GAME PICKER */
        #game-picker {
            position: absolute;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 200;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: white;
            text-align: center;
        }

        .game-card {
            width: 350px;
            background: #222;
            border: 3px solid #2e7d32;
            border-radius: 20px;
            padding: 20px;
            transition: 0.3s;
            cursor: pointer;
        }

        .game-card:hover {
            transform: scale(1.05);
            background: #2a2a2a;
            border-color: #00ff00;
        }

        /* GAME ELEMENTS */
        #game-box {
            position: relative;
            width: 100vw; height: 100vh;
            display: none; /* Hidden until game starts */
            background: #222;
            background-image: linear-gradient(0deg, transparent 24%, rgba(255, 255, 255, .05) 25%, rgba(255, 255, 255, .05) 26%, transparent 27%, transparent 74%, rgba(255, 255, 255, .05) 75%, rgba(255, 255, 255, .05) 76%, transparent 77%, transparent), linear-gradient(90deg, transparent 24%, rgba(255, 255, 255, .05) 25%, rgba(255, 255, 255, .05) 26%, transparent 27%, transparent 74%, rgba(255, 255, 255, .05) 75%, rgba(255, 255, 255, .05) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
        }

        #car {
            position: absolute;
            width: 60px; height: 40px;
            background: #2e7d32;
            border-radius: 8px;
            border: 3px solid #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; z-index: 10;
        }

        .battery {
            position: absolute;
            width: 35px; height: 35px;
            background: #ffeb3b;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px #ffeb3b;
            animation: pulse 1s infinite;
        }

        #ui {
            position: absolute;
            top: 20px; left: 20px;
            color: white; z-index: 100;
            background: rgba(0,0,0,0.7);
            padding: 15px; border-radius: 15px;
            display: none;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="game-picker">
        <h1 class="mb-5 text-success">Climate Wise Arcade</h1>
        <div class="game-card" onclick="startGame()">
            <h2 class="text-warning">⚡ Battery Dash</h2>
            <hr class="bg-light">
            <p>Race an Electric Vehicle to the charging station!</p>
            <ul class="text-start small">
                <li>Collect <strong>⚡ Batteries</strong> for +5s time.</li>
                <li>Reach <strong>0m</strong> to win.</li>
                <li><strong>8-Way Dash:</strong> Move + Space to boost!</li>
            </ul>
            <button class="btn btn-success w-100 mt-2">PLAY GAME</button>
        </div>
        <p class="mt-4 text-muted">More games coming soon...</p>
    </div>

    <div id="ui">
        <h3 class="m-0">🔋 Charge: <span id="timer">30</span>s</h3>
        <p class="m-0">Distance: <span id="dist">2000</span>m</p>
        <p class="m-0" id="dash-status">Dash: READY (SPACE)</p>
    </div>

    <div id="game-box">
        <div id="car">🚗</div>
    </div>

    <script>
        let time = 30;
        let distance = 2000;
        let posX = 100;
        let posY = window.innerHeight / 2;
        let canDash = true;
        let gameActive = false;

        const car = document.getElementById('car');
        const timerEl = document.getElementById('timer');
        const distEl = document.getElementById('dist');
        const dashEl = document.getElementById('dash-status');
        const keys = {};

        // 8-DIRECTIONAL INPUT
        window.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
            if (e.code === 'Space' && canDash && gameActive) perform8WayDash();
        });
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        function startGame() {
            document.getElementById('game-picker').style.display = 'none';
            document.getElementById('game-box').style.display = 'block';
            document.getElementById('ui').style.display = 'block';
            gameActive = true;
            spawnInitialBatteries();
            update();
            startTimer();
        }

        function perform8WayDash() {
            canDash = false;
            let dashDistance = 180;
            
            // Determine dash direction based on keys held
            let dx = 0;
            let dy = 0;

            if (keys['w'] || keys['arrowup']) dy = -1;
            if (keys['s'] || keys['arrowdown']) dy = 1;
            if (keys['a'] || keys['arrowleft']) dx = -1;
            if (keys['d'] || keys['arrowright']) dx = 1;

            // If no keys held, dash forward (East)
            if (dx === 0 && dy === 0) dx = 1;

            posX += dx * dashDistance;
            posY += dy * dashDistance;

            dashEl.innerText = "Dash: RECHARGING...";
            dashEl.style.color = "red";
            
            setTimeout(() => {
                canDash = true;
                dashEl.innerText = "Dash: READY (SPACE)";
                dashEl.style.color = "#00ff00";
            }, 1500);
        }

        function update() {
            if (!gameActive) return;

            let speed = 6;
            if (keys['w'] || keys['arrowup']) posY -= speed;
            if (keys['s'] || keys['arrowdown']) posY += speed;
            if (keys['a'] || keys['arrowleft']) posX -= speed;
            if (keys['d'] || keys['arrowright']) posX += speed + 1; // Constant forward drift

            // Boundaries
            posX = Math.max(0, posX);
            posY = Math.max(50, Math.min(window.innerHeight - 50, posY));

            car.style.transform = `translate(${posX}px, ${posY}px)`;

            // Distance Tracking
            distance = Math.max(0, 2000 - Math.floor(posX / 2));
            distEl.innerText = distance;

            if (distance <= 0) endGame(true);

            checkCollisions();
            requestAnimationFrame(update);
        }

        function checkCollisions() {
            const batteries = document.querySelectorAll('.battery');
            const carRect = car.getBoundingClientRect();

            batteries.forEach(b => {
                const bRect = b.getBoundingClientRect();
                if (!(carRect.right < bRect.left || carRect.left > bRect.right || 
                      carRect.bottom < b
